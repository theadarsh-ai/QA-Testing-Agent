kind = "web"
previewPath = "/"
title = "DesignGuard"
version = "1.0.0"
id = "artifacts/designguard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23892
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/designguard run dev"

[services.env]
PORT = "23892"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/designguard", "run", "build"]
publicDir = "artifacts/designguard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
